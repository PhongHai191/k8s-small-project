apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: webapp

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      nodeSelector:
        role: frontend

      containers:
      - name: frontend
        image: yance1/webapp-frontend:1.0

        ports:
        - containerPort: 3000