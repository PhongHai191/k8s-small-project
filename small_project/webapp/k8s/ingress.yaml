apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webapp-ingress
  namespace: webapp

spec:
  ingressClassName: nginx

  rules:
  - host: webapp.local
    http:
      paths:

      - path: /products
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5000

      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5000

      - path: /reviews
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5000

      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
